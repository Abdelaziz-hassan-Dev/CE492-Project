<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CE491 — IoT Safety Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        
        <header>
            <div class="header-left">
                <div class="logo-mark">🛡️</div>
                <div class="header-titles">
                    <h2>Safety Dashboard</h2>
                    <span class="subtitle">IoT Heater Monitor · CE491</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span id="connectionDot" class="dot offline"></span>
                    <span id="connectionText">Offline</span>
                </div>
                <p class="timestamp">Updated: <span id="lastUpdate">--:--</span></p>
            </div>
        </header>

        <div class="divider"></div>
        
        <div class="cards-grid">

            <div class="card temp-card">
                <div class="card-header">
                    <i class="fas fa-thermometer-half icon"></i>
                    <span class="card-label">Temperature</span>
                </div>
                <div class="card-value">
                    <span id="temperature" class="value-num">--</span>
                    <span class="unit">°C</span>
                </div>
                <div class="card-bar"><div class="bar-fill temp-fill" id="tempBar"></div></div>
            </div>

            <div class="card hum-card">
                <div class="card-header">
                    <i class="fas fa-tint icon"></i>
                    <span class="card-label">Humidity</span>
                </div>
                <div class="card-value">
                    <span id="humidity" class="value-num">--</span>
                    <span class="unit">%</span>
                </div>
                <div class="card-bar"><div class="bar-fill hum-fill" id="humBar"></div></div>
            </div>

            <div class="card flame-card" id="flameCard">
                <div class="card-header">
                    <i class="fas fa-fire icon"></i>
                    <span class="card-label">Fire Status</span>
                </div>
                <div class="card-value status-value">
                    <span id="flame">Checking…</span>
                </div>
            </div>

            <div class="card gas-card" id="gasCard">
                <div class="card-header">
                    <i class="fas fa-smog icon"></i>
                    <span class="card-label">Gas Status</span>
                </div>
                <div class="card-value status-value">
                    <span id="gas">Checking…</span>
                </div>
            </div>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script> 
</body>
</html>
